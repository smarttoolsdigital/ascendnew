<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#0a0806" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ascension" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<title>Ascension</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0a0806;--bone:#e8ddca;--dim:#8a7d5a;--gold:#d8b25a;--crim:#a33a34;
    --line:rgba(216,178,90,.13);--ink:rgba(10,8,6,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;background:var(--bg);color:var(--bone);font-family:'EB Garamond',Georgia,serif;overscroll-behavior:none}

  /* ---------- the room (atmosphere lives behind everything) ---------- */
  #atmo{position:fixed;inset:0;z-index:0;pointer-events:none}
  #hearth{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 55% at 50% 108%, rgba(255,122,42,.16), transparent 60%),
      radial-gradient(90% 40% at 82% -6%, rgba(216,178,90,.07), transparent 60%),
      linear-gradient(180deg, #0b0908 0%, #0a0806 45%, #0c0806 100%);}
  #vig{position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 160px 30px rgba(0,0,0,.8);
    background:radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(0,0,0,.35) 100%)}

  /* ---------- content sits in the room ---------- */
  #app{position:relative;z-index:3;max-width:560px;margin:0 auto;min-height:100%;
    padding:0 18px calc(env(safe-area-inset-bottom) + 84px);display:flex;flex-direction:column}
  .header{display:flex;align-items:flex-start;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 18px) 2px 4px}
  .brand{font-family:'Cinzel';font-weight:700;letter-spacing:.3em;font-size:14px;color:#cbb98a;opacity:.9}
  .greet{font-style:italic;color:var(--dim);font-size:13px;margin-top:3px}
  /* the streak is a flame, not a stat chip */
  .streak{text-align:center;line-height:1}
  .streak .fl{display:block;font-size:22px;filter:drop-shadow(0 0 8px rgba(255,140,50,.55));
    animation:flick 2.8s ease-in-out infinite}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-1deg)}30%{transform:scale(1.06) rotate(1deg)}60%{transform:scale(.97)}}
  .streak b{font-family:'Cinzel';color:var(--gold);font-size:16px}
  .streak span{display:block;font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:2px}

  .view{flex:1;animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

  /* the directive: a line spoken into the room, not a card */
  .directive{text-align:center;padding:22px 8px 20px}
  .dtext{font-size:19px;font-style:italic;color:#f0e6cf;line-height:1.4;text-shadow:0 2px 18px rgba(0,0,0,.9)}
  .dwhy{font-size:13px;color:#9a8d6d;margin-top:7px;line-height:1.5;font-style:italic}

  /* the quiet 5-second whisper */
  .quickrec{margin:0 0 14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 4px}
  .qlabel{font-family:'Cinzel';font-size:9.5px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin-bottom:6px;text-align:center}
  .qrow{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px;color:#bcae90}
  .qrow span{flex:0 0 72px}.qrow input{flex:1;accent-color:var(--gold)}.qrow b{min-width:26px;text-align:right;color:var(--gold)}
  .qsave{width:100%;margin-top:6px;padding:8px;border:none;background:transparent;color:var(--gold);
    font-family:'Cinzel';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase}

  /* ---------- THE BOARD: one object on the wall, not rows of panels ---------- */
  .board{position:relative;border-radius:6px;padding:18px 16px 16px;margin-top:6px;
    background:linear-gradient(172deg,#171208 0%,#120d07 55%,#0f0b06 100%);
    border:1px solid rgba(216,178,90,.2);
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(216,178,90,.12), inset 0 0 60px rgba(0,0,0,.5)}
  .board::before,.board::after{content:'';position:absolute;left:10px;right:10px;height:3px;border-radius:2px;
    background:linear-gradient(90deg,transparent,rgba(216,178,90,.35),transparent)}
  .board::before{top:6px}.board::after{bottom:6px}
  .trialhead{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:12px}
  .tname{font-family:'Cinzel';font-weight:700;font-size:20px;color:#ecdfc0;letter-spacing:.02em}
  .tfocus{font-style:italic;color:var(--dim);font-size:13.5px;margin-top:2px}
  .switch{border:none;background:transparent;color:#6f6345;font-family:'Cinzel';font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;text-decoration:underline;text-underline-offset:3px;padding:6px 2px}

  .exrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-top:1px solid rgba(216,178,90,.09)}
  .exmain{flex:1;min-width:0}
  .exname{font-size:16.5px;color:#e4d7b8}.exmeta{font-size:12.5px;color:var(--dim);margin:1px 0 6px}
  .dots{display:flex;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #57492f;transition:.25s}
  .dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(216,178,90,.6)}
  .exright{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .weight{display:flex;align-items:center;gap:7px}
  .wbtn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(216,178,90,.22);background:rgba(0,0,0,.3);
    color:var(--gold);font-size:19px;line-height:1}
  .wval{font-size:15px;color:#e4d7b8;font-variant-numeric:tabular-nums;min-width:50px;text-align:center}
  .wval i{font-style:normal;font-size:10px;color:var(--dim);margin-left:2px}
  /* logging a set = pressing a seal */
  .logbtn{padding:9px 15px;border-radius:8px;border:1px solid rgba(216,178,90,.4);
    background:linear-gradient(180deg,rgba(216,178,90,.1),rgba(0,0,0,.2));
    color:var(--gold);font-family:'Cinzel';font-size:11px;letter-spacing:.1em}
  .logbtn:active{transform:scale(.96);background:rgba(216,178,90,.2)}
  .logbtn:disabled{opacity:.35;border-color:#57492f;color:#8a7d5a}
  .logbtn.wide{width:100%;margin-top:10px}
  .complete{width:100%;margin-top:14px;padding:15px;border-radius:9px;border:1px solid #e6c884;
    background:linear-gradient(180deg,#e2c37c,#b8912f);color:#1a140a;
    font-family:'Cinzel';font-weight:700;letter-spacing:.14em;font-size:13px;
    box-shadow:0 6px 24px rgba(216,178,90,.22)}
  .complete:active{transform:scale(.99)}
  .donecard{text-align:center;padding:34px 12px;color:#d7cbae;font-style:italic;font-size:17px;line-height:1.5}

  /* record: carved numbers, no boxes */
  .sectitle{font-family:'Cinzel';font-size:11px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase;
    margin:18px 2px 10px;text-align:center}
  .sectitle.small{color:var(--dim)}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px 0}
  .stat{padding:14px;text-align:center}
  .stat b{display:block;font-family:'Cinzel';font-size:32px;color:var(--gold);text-shadow:0 0 20px rgba(216,178,90,.25)}
  .stat span{font-size:11px;color:var(--dim);letter-spacing:.08em;font-style:italic}
  .histrow{display:flex;justify-content:space-between;gap:8px;padding:11px 4px;border-bottom:1px solid rgba(216,178,90,.08);font-size:13px;color:#c9bd9e}
  .empty{color:var(--dim);font-style:italic;padding:22px 4px;text-align:center}

  /* more: quiet function */
  .plancard{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;background:rgba(0,0,0,.25)}
  .planhead{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;font-size:15px;color:#e4d7b8}
  .planhead b{color:var(--dim)}
  .planbody{padding:0 14px 14px}
  .planrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid rgba(216,178,90,.08);font-size:13px}
  .pname{flex:1;color:#d8ccae;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pctl{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:11px}
  .pctl b{color:var(--gold);min-width:26px;text-align:center;font-size:13px}
  .pctl button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--gold);font-size:15px;line-height:1}
  .pdel{border:none;background:transparent;color:#7a4a42;font-size:13px;padding:4px}
  .planadd{display:flex;gap:8px;padding-top:10px}
  .planadd input{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:#e8dcc0;font-family:inherit;font-size:14px}
  .planadd button{width:38px;border-radius:9px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:18px}
  .reccard{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 4px;margin-bottom:8px}
  .reccard label{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:14px;color:#bcae90}
  .reccard label input{flex:1;accent-color:var(--gold)}.reccard label b{min-width:30px;text-align:right;color:var(--gold)}
  .datacard{padding:6px 4px 14px}
  .databtns{display:flex;gap:8px;margin-top:12px}
  .warn{color:#e0a24a;font-size:13px;line-height:1.4}.ok{color:#8faf6a;font-size:13px;text-align:center}
  .hallbtn{display:block;text-align:center;text-decoration:none;padding:14px;border-radius:10px;
    border:1px solid var(--line);color:var(--gold);font-family:'Cinzel';letter-spacing:.12em;font-size:13px;
    background:linear-gradient(160deg,rgba(216,178,90,.06),transparent)}
  .fine{font-size:11.5px;color:#6f6547;font-style:italic;margin-top:8px;line-height:1.5;text-align:center}

  .nav{position:fixed;left:0;right:0;bottom:0;z-index:4;display:flex;justify-content:center;gap:4px;
    padding:10px 8px calc(env(safe-area-inset-bottom) + 10px);
    background:linear-gradient(transparent, #0a0806 55%)}
  .nb{flex:1;max-width:140px;padding:10px;border:none;background:transparent;color:#6f6547;
    font-family:'Cinzel';font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;transition:.2s}
  .nb.on{color:var(--gold);text-shadow:0 0 14px rgba(216,178,90,.45)}

  #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 78px);transform:translateX(-50%) translateY(12px);
    background:rgba(20,15,10,.92);border:1px solid var(--line);color:#e8dcc0;padding:10px 18px;border-radius:24px;
    font-size:13px;font-style:italic;opacity:0;transition:.3s;pointer-events:none;z-index:20;max-width:82vw;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #rest{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 10px);transform:translateX(-50%) translateY(-8px);
    background:rgba(22,15,9,.94);border:1px solid rgba(255,140,50,.45);border-radius:22px;padding:8px 14px;
    font-size:13px;color:#e8dcc0;display:flex;gap:10px;align-items:center;opacity:0;pointer-events:none;transition:.25s;z-index:25;
    box-shadow:0 0 24px rgba(255,120,40,.18)}
  #rest.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #rest b{color:#ffb057;font-variant-numeric:tabular-nums;min-width:34px;text-align:center}
  #rest button{border:none;background:transparent;color:var(--dim);font-size:12px;text-decoration:underline}
  #boot{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:30;
    transition:opacity .7s;font-family:'Cinzel';letter-spacing:.34em;color:var(--gold);font-size:15px;
    text-shadow:0 0 24px rgba(216,178,90,.3)}
  #boot.gone{opacity:0;pointer-events:none}

  /* v1.3 daily-driver additions */
  .headbtns{display:flex;gap:4px}
  .exrow.active{background:linear-gradient(90deg,rgba(216,178,90,.07),transparent);border-radius:8px;margin:0 -8px;padding-left:10px;padding-right:10px}
  .exrow.finished{opacity:.45}
  .logbtn.primary{background:linear-gradient(180deg,rgba(216,178,90,.25),rgba(216,178,90,.08));box-shadow:0 0 14px rgba(216,178,90,.15)}
  .dot.warm{border-style:dashed;border-color:#6f6345}
  .dot.warm.on{background:transparent;border-color:var(--gold);box-shadow:inset 0 0 3px var(--gold)}
  .noteline{font-size:12px;font-style:italic;color:#9a8d6d;margin:1px 0 5px}
  .sstag{font-size:12px;color:#8faf9a}
  .prval{color:var(--gold)}
  #toast button{border:none;background:transparent;color:var(--gold);font-size:13px;text-decoration:underline;margin-left:8px;font-family:inherit;font-style:normal}
  .planrow.wrapv{display:block}
  .prtop{display:flex;justify-content:space-between;align-items:center}
  .prctl{display:flex;flex-wrap:wrap;gap:10px;margin:7px 0}
  .sstoggle{width:30px;height:26px;border-radius:7px;border:1px solid var(--line);background:transparent;color:#6f6345;font-size:13px}
  .sstoggle.on{color:#8faf9a;border-color:#8faf9a}
  .pnote{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:#d8ccae;font-family:inherit;font-size:13px;font-style:italic}

</style>
</head>
<body>
<div id="hearth"></div>
<canvas id="atmo"></canvas>
<div id="vig"></div>
<div id="app"></div>
<div id="toast"></div>
<div id="rest"></div>
<div id="boot">ASCENSION</div>
<script>
// The room breathes: embers rising from the hearth below, dust hanging in the air.
// Cheap on purpose — ~40 particles, pauses when the tab is hidden.
(function(){
  var c=document.getElementById('atmo'),x=c.getContext('2d'),W,H,P=[],run=true;
  function size(){W=c.width=innerWidth;H=c.height=innerHeight;}
  size(); addEventListener('resize',size);
  function spawn(i){
    var ember=i<16;
    P[i]={e:ember,x:Math.random()*W,y:ember?H+10:Math.random()*H,
      v:ember?(.25+Math.random()*.5):(.05+Math.random()*.1),
      r:ember?(1+Math.random()*1.6):(.6+Math.random()*.9),
      w:Math.random()*6.28,o:ember?(.25+Math.random()*.4):(.08+Math.random()*.12)};
  }
  for(var i=0;i<40;i++){spawn(i);P[i].y=Math.random()*H;}
  document.addEventListener('visibilitychange',function(){run=!document.hidden;if(run)requestAnimationFrame(tick);});
  var t=0;
  function tick(){
    if(!run)return;
    t+=.016; x.clearRect(0,0,W,H);
    for(var i=0;i<P.length;i++){var p=P[i];
      p.y-=p.v; p.x+=Math.sin(t+p.w)*.18;
      if(p.y<-10) spawn(i);
      var flick=p.e?(.7+.3*Math.sin(t*6+p.w)):1;
      x.globalAlpha=p.o*flick;
      x.fillStyle=p.e?'#ff9a4a':'#e8d9b0';
      x.beginPath();x.arc(p.x,p.y,p.r,0,6.283);x.fill();
    }
    x.globalAlpha=1;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
<script type="module" src="./app.js"></script>
</body>
</html>
